# Supabase 프로젝트 설정 파일
# Supabase CLI를 사용하여 로컬 개발 환경 설정

[project]
# Supabase 프로젝트 ID (Supabase 대시보드에서 확인)
# project_id = "your-project-id"

[auth]
# 인증 설정
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[api]
# API 설정
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
# 데이터베이스 설정
port = 54322
shadow_port = 54320
major_version = 15

[studio]
# Studio 설정
enabled = true
port = 54323
api_url = "http://127.0.0.1:54321"

[inbucket]
# 이메일 테스트 설정
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
# Storage 설정
enabled = true
file_size_limit = "50MiB"

[edge_runtime]
# Edge Functions 설정
enabled = true
inspector_port = 54328
